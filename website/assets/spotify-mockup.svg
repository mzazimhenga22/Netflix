<svg width="280" height="560" viewBox="0 0 280 560" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Phone Frame -->
  <rect x="5" y="5" width="270" height="550" rx="40" fill="#000000" stroke="#333" stroke-width="4"/>
  <rect x="15" y="15" width="250" height="530" rx="32" fill="#121212"/>
  
  <!-- Status Bar -->
  <rect x="110" y="25" width="60" height="20" rx="10" fill="#222"/>
  
  <!-- Header -->
  <text x="140" y="70" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="12" font-weight="bold">NOW PLAYING</text>
  
  <!-- Album Art -->
  <rect x="35" y="100" width="210" height="210" rx="12" fill="url(#album-grad)"/>
  <circle cx="140" cy="205" r="40" fill="rgba(0,0,0,0.3)"/>
  <path d="M130 190L160 205L130 220V190Z" fill="#fff"/>
  
  <!-- Song Info -->
  <text x="35" y="340" fill="#fff" font-family="sans-serif" font-size="18" font-weight="bold">After Hours</text>
  <text x="35" y="365" fill="#1DB954" font-family="sans-serif" font-size="14">The Weeknd</text>
  
  <!-- Progress Bar -->
  <rect x="35" y="400" width="210" height="4" rx="2" fill="#333"/>
  <rect x="35" y="400" width="120" height="4" rx="2" fill="#1DB954"/>
  <circle cx="155" cy="402" r="4" fill="#1DB954"/>
  
  <!-- Controls -->
  <g transform="translate(35, 440)">
    <!-- Shuffle -->
    <path d="M10 10L30 30M10 30L30 10" stroke="#fff" stroke-width="2"/>
    <!-- Prev -->
    <path d="M60 20L80 10V30L60 20Z" fill="#fff"/>
    <rect x="55" y="10" width="2" height="20" fill="#fff"/>
    <!-- Play/Pause -->
    <circle cx="105" cy="20" r="25" fill="#fff"/>
    <rect x="100" y="12" width="4" height="16" fill="#000"/>
    <rect x="106" y="12" width="4" height="16" fill="#000"/>
    <!-- Next -->
    <path d="M150 20L130 10V30L150 20Z" fill="#fff"/>
    <rect x="153" y="10" width="2" height="20" fill="#fff"/>
    <!-- Repeat -->
    <path d="M180 10H200V20L190 30L180 20V10Z" stroke="#fff" stroke-width="2" fill="none"/>
  </g>

  <!-- Made For You -->
  <g transform="translate(35, 490)">
    <text x="0" y="0" fill="#fff" font-family="sans-serif" font-size="12" font-weight="bold">Made For You</text>
    <g transform="translate(0, 8)">
      <rect width="50" height="50" rx="4" fill="#333"/>
      <image href="https://api.dicebear.com/7.x/identicon/svg?seed=Mix1" x="0" y="0" width="50" height="50"/>
      <rect x="60" width="50" height="50" rx="4" fill="#333"/>
      <image href="https://api.dicebear.com/7.x/identicon/svg?seed=Mix2" x="60" y="0" width="50" height="50"/>
      <rect x="120" width="50" height="50" rx="4" fill="#333"/>
      <image href="https://api.dicebear.com/7.x/identicon/svg?seed=Mix3" x="120" y="0" width="50" height="50"/>
      <rect x="180" width="50" height="50" rx="4" fill="#333"/>
      <image href="https://api.dicebear.com/7.x/identicon/svg?seed=Mix4" x="180" y="0" width="50" height="50"/>
    </g>
  </g>

  <defs>
    <linearGradient id="album-grad" x1="0" y1="0" x2="210" y2="210" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8E24AA"/>
      <stop offset="1" stop-color="#1DB954"/>
    </linearGradient>
  </defs>
</svg>
